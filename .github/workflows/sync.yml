name: Sync Upstream & Patch

on:
  schedule:
    - cron: "0 8 * * *" # Daily 08:00 UTC
  workflow_dispatch:

env:
  NODE_VERSION: "24"

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_update: ${{ steps.detect.outputs.has_update }}
      should_build: ${{ steps.detect.outputs.should_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check upstream versions
        id: detect
        run: |
          RESULT=$(node scripts/check-update.js --json --force)
          LATEST_VERSION=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{const j=JSON.parse(d);console.log(j.platforms?.['macOS-arm64']?.version||j.platforms?.['macOS-x64']?.version||j.platforms?.Windows?.version||'')})")
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          if [ -z "$LATEST_VERSION" ]; then
            echo "No upstream version detected."
            exit 1
          fi

          IS_NEWER=$(node -e "
            const [latest, current] = process.argv.slice(1);
            const valid = /^\d+(?:\.\d+)*$/;
            if (!valid.test(latest) || !valid.test(current)) {
              console.error('Invalid version:', { latest, current });
              process.exit(1);
            }
            const a = latest.split('.').map(Number);
            const b = current.split('.').map(Number);
            const length = Math.max(a.length, b.length);
            let comparison = 0;
            for (let i = 0; i < length; i++) {
              if ((a[i] || 0) !== (b[i] || 0)) {
                comparison = (a[i] || 0) > (b[i] || 0) ? 1 : -1;
                break;
              }
            }
            console.log(comparison > 0 ? 'true' : 'false');
          " "$LATEST_VERSION" "$CURRENT_VERSION")

          echo "Latest upstream version: $LATEST_VERSION"
          echo "Current repository version: $CURRENT_VERSION"
          echo "has_update=$IS_NEWER" >> "$GITHUB_OUTPUT"

          if [ "$IS_NEWER" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Build requested by update detection or manual workflow run."
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "No newer upstream version detected."
          fi

  # ──────────────────────────────────────────────
  # Each platform: sync + patch + build in one job
  # (src/ is gitignored, so it must be generated per-runner)
  # ──────────────────────────────────────────────
  build-mac:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Install tools
        run: |
          brew untap aws/tap || true
          brew install --quiet sevenzip

      - name: Sync upstream (macOS only)
        run: node scripts/sync-upstream.js --force --skip-win

      - name: Patch
        run: node scripts/patch-all.js mac-${{ matrix.arch }}

      - name: Build
        run: npm run build:mac-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-macOS-${{ matrix.arch }}
          path: out/*.dmg
          if-no-files-found: error

  build-windows:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: |
          npm ci

      - name: Install tools
        run: |
          choco install 7zip -y

      - name: Add 7zz alias
        run: |
          Copy-Item "C:\Program Files\7-Zip\7z.exe" "C:\Program Files\7-Zip\7zz.exe"
          echo "C:\Program Files\7-Zip" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Sync upstream (Windows only)
        run: node scripts/sync-upstream.js --force --skip-mac

      - name: Patch
        run: node scripts/patch-all.js win

      - name: Build
        run: npm run build:win-x64

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Codex-Windows-x64
          path: out/*.zip
          if-no-files-found: error

  # ──────────────────────────────────────────────
  # Bump version + tag + release
  # ──────────────────────────────────────────────
  release:
    needs: [check, build-mac, build-windows]
    if: >-
      always() &&
      needs.check.result == 'success' &&
      (needs.check.outputs.has_update == 'true' || github.event_name == 'workflow_dispatch') &&
      needs.build-mac.result == 'success' &&
      needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Get upstream version and tag
        id: version
        run: |
          RESULT=$(node scripts/check-update.js --json --force)
          MAC_ARM64=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-arm64']?.version||'')}catch{console.log('')}})")
          MAC_X64=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.['macOS-x64']?.version||'')}catch{console.log('')}})")
          WIN_VER=$(echo "$RESULT" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const j=JSON.parse(d);console.log(j.platforms?.Windows?.version||'')}catch{console.log('')}})")

          VERSION="${MAC_ARM64:-${MAC_X64:-$WIN_VER}}"
          if [[ ! "$VERSION" =~ ^[0-9]+([.][0-9]+)*$ ]]; then
            echo "Invalid or missing upstream version: '$VERSION'"
            exit 1
          fi

          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "mac_arm64=$MAC_ARM64" >> "$GITHUB_OUTPUT"
          echo "mac_x64=$MAC_X64" >> "$GITHUB_OUTPUT"
          echo "win_version=$WIN_VER" >> "$GITHUB_OUTPUT"

          node -e "
            const fs=require('fs'), p=JSON.parse(fs.readFileSync('package.json','utf8'));
            p.version='$VERSION';
            fs.writeFileSync('package.json', JSON.stringify(p,null,2)+'\n');
          "

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add package.json
          if git diff --cached --quiet; then
            echo "package.json is already at ${VERSION}"
          else
            git commit -m "Bump version to ${VERSION}"
            git push origin HEAD
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists"
          else
            git tag -a "$TAG" -m "Codex ${VERSION}"
            git push origin "$TAG"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Display structure
        run: ls -lhR artifacts/

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN || github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          MAC_ARM64_VERSION: ${{ steps.version.outputs.mac_arm64 || 'N/A' }}
          WINDOWS_VERSION: ${{ steps.version.outputs.win_version || 'N/A' }}
        run: |
          shopt -s globstar nullglob
          DMG_FILES=(artifacts/**/*.dmg)
          ZIP_FILES=(artifacts/**/*.zip)

          if (( ${#DMG_FILES[@]} == 0 || ${#ZIP_FILES[@]} == 0 )); then
            echo "Expected at least one DMG and one ZIP release artifact"
            exit 1
          fi

          ASSETS=("${DMG_FILES[@]}" "${ZIP_FILES[@]}")
          cat > release-notes.md <<EOF
          ## Upstream Versions
          | Platform | Version |
          |----------|---------|
          | macOS arm64 | \`${MAC_ARM64_VERSION}\` |
          | Windows x64 | \`${WINDOWS_VERSION}\` |
          EOF

          publish_release() {
            if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
              gh release edit "$RELEASE_TAG" \
                --title "Codex ${RELEASE_VERSION}" \
                --notes-file release-notes.md \
                --latest &&
              gh release upload "$RELEASE_TAG" "${ASSETS[@]}" --clobber
            else
              gh release create "$RELEASE_TAG" "${ASSETS[@]}" \
                --verify-tag \
                --title "Codex ${RELEASE_VERSION}" \
                --notes-file release-notes.md \
                --latest
            fi
          }

          for attempt in 1 2 3; do
            echo "Publishing ${RELEASE_TAG} (attempt ${attempt}/3)"
            if publish_release; then
              exit 0
            fi
            if (( attempt < 3 )); then
              sleep $((attempt * 15))
            fi
          done

          echo "Release publishing failed after 3 attempts"
          exit 1
